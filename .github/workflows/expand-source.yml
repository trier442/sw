name: Expand source package

on:
  pull_request:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: write

jobs:
  expand:
    if: github.event_name == 'workflow_dispatch' || github.head_ref == 'agent/publish-full-site'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ github.head_ref || github.ref_name }}
          fetch-depth: 0

      - name: Rebuild source archive
        run: |
          cat .upload/source.zip.b64.part* | base64 --decode > /tmp/thesophie-daily.zip
          rm -rf /tmp/thesophie-source
          mkdir -p /tmp/thesophie-source
          unzip -q /tmp/thesophie-daily.zip -d /tmp/thesophie-source
          cp -a /tmp/thesophie-source/thesophie-daily/. ./

      - name: Validate application
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          python -m pytest -q

      - name: Commit expanded source
        run: |
          rm -rf .upload
          rm -f .github/workflows/expand-source.yml
          git config user.name 'github-actions[bot]'
          git config user.email '41898282+github-actions[bot]@users.noreply.github.com'
          git add -A
          git diff --cached --quiet && exit 0
          git commit -m 'Publish complete 더소피 매일학습 source'
          git push origin HEAD:${{ github.head_ref || github.ref_name }}
