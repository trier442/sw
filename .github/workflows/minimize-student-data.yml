name: Apply name-only student data policy

on:
  push:
    branches: [main]
    paths:
      - '.privacy-trigger-main'

permissions:
  contents: write

jobs:
  minimize:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: main
          fetch-depth: 0

      - name: Apply privacy minimization
        run: python scripts/minimize_student_data.py

      - name: Run validation
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          python -m py_compile app.py
          python -m pytest -q

      - name: Commit validated source
        run: |
          rm -rf .github/workflows
          rm -f .privacy-trigger-main
          rm -f scripts/minimize_student_data.py
          rmdir scripts 2>/dev/null || true
          git config user.name 'github-actions[bot]'
          git config user.email '41898282+github-actions[bot]@users.noreply.github.com'
          git add -A
          git commit -m 'Minimize student data and validate site'
          git push origin main
