name: Assemble complete source

on:
  pull_request:
    branches: [main]

permissions:
  contents: write

jobs:
  assemble:
    if: github.head_ref == 'agent/publish-full-site'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ github.head_ref }}
          fetch-depth: 0

      - name: Assemble source files
        run: |
          cat .build/app.py.part* > app.py
          mkdir -p static
          cat .build/app.css.part* > static/app.css
          python -m py_compile app.py

      - name: Install and run tests
        continue-on-error: true
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          python -m pytest -q

      - name: Commit complete source
        run: |
          rm -rf .build
          rm -rf .github/workflows
          git config user.name 'github-actions[bot]'
          git config user.email '41898282+github-actions[bot]@users.noreply.github.com'
          git add -A
          git commit -m 'Publish complete 더소피 매일학습 source'
          git push origin HEAD:${{ github.head_ref }}
