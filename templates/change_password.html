{% extends "base.html" %}
{% block title %}비밀번호 변경{% endblock %}
{% block content %}
<div class="page-heading"><div><p class="eyebrow">ACCOUNT</p><h1>비밀번호 변경</h1><p class="muted">영문과 숫자를 포함해 10자 이상으로 설정하세요.</p></div></div>
<section class="panel narrow">
<form method="post" class="stack-form">
  <input type="hidden" name="_csrf" value="{{ csrf_token() }}">
  <label>현재 비밀번호<input type="password" name="current_password" required></label>
  <label>새 비밀번호<input type="password" name="new_password" minlength="10" required></label>
  <label>새 비밀번호 확인<input type="password" name="confirm_password" minlength="10" required></label>
  <button class="button primary" type="submit">변경하기</button>
</form>
</section>
{% endblock %}
